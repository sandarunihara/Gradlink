<svg class="login-illustration" width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <style>
        .login path {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .login path:nth-of-type(1) { /* Person */
            stroke: #4361ee;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: draw 1s ease-out forwards;
        }
        
        .login path:nth-of-type(2) { /* Laptop */
            stroke: #3a56d4;
            stroke-dasharray: 250;
            stroke-dashoffset: 250;
            animation: draw 1s ease-out forwards 0.3s;
        }
        
        .login path:nth-of-type(3) { /* Connection line */
            stroke: #4cc9f0;
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
            animation: draw 1.5s ease-out forwards 0.5s;
        }
        
        .login circle:not([fill-opacity]) { /* Dots */
            fill: #4cc9f0;
            opacity: 0;
            animation: pulse 2s infinite ease-in-out;
            animation-delay: calc(var(--order) * 0.2s);
        }
        
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
    
    <g class="login" transform="translate(50, 50)">
        <!-- Person -->
        <path d="M50,100 C50,70 80,70 80,100 C80,130 110,130 110,100 C110,70 140,70 140,100 C140,130 170,130 170,100 L170,150 C170,180 140,180 140,150 L140,200 L110,200 L110,150 C110,180 80,180 80,150 L50,150" />
        
        <!-- Laptop -->
        <path d="M250,150 L250,120 C250,90 280,90 280,120 L280,180 C280,210 250,210 250,180 L250,150 M220,180 L310,180" />
        
        <!-- Connection line with animated dots -->
        <path d="M170,120 Q200,120 220,120" />
        <circle cx="180" cy="120" r="3" style="--order: 1" />
        <circle cx="190" cy="120" r="3" style="--order: 2" />
        <circle cx="200" cy="120" r="3" style="--order: 3" />
        <circle cx="210" cy="120" r="3" style="--order: 4" />
        
        <!-- Floating elements around -->
        <circle cx="30" cy="50" r="8" fill="#4361ee" opacity="0.1">
            <animate attributeName="cy" values="50;45;50;55;50" dur="8s" repeatCount="indefinite" />
        </circle>
        <circle cx="350" cy="80" r="6" fill="#4cc9f0" opacity="0.1">
            <animate attributeName="cy" values="80;75;80;85;80" dur="6s" repeatCount="indefinite" />
        </circle>
        <circle cx="280" cy="30" r="5" fill="#3a56d4" opacity="0.1">
            <animate attributeName="cx" values="280;275;280;285;280" dur="7s" repeatCount="indefinite" />
        </circle>
    </g>
</svg>